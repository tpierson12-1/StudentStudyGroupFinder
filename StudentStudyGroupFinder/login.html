<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>User Login</title>
    <link rel="icon" href="favicon/groupstudy.jpg" type="image/jpeg"/>
    <link rel="stylesheet" href="login.css" />
  </head>
  <body>
    <div class="container">
  <h1>Create Account</h1>

  <form action="dashboard.html">
    <label for="fname">First Name:</label><br />
    <input type="text" id="fname" name="fname" /><br /><br />

    <label for="lname">Last Name:</label><br />
    <input type="text" id="lname" name="lname" /><br /><br />

    <label for="email">Enter your Email:</label><br />
    <input type="email" id="email" name="email" /><br /><br />

    <label for="pwd">Enter your Password:</label><br />
    <input type="password" id="pwd" name="pwd" /><br /><br />

    <label for="confirm_pwd">Reenter your Password:</label><br />
    <input type="password" id="confirm_pwd" name="confirm_pwd" /><br /><br />

    <input type="submit" value="Create Account" />
  </form>
</div>
    </div>
  </body>
</html>
