<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="/static/favicon/groupstudy.jpg" type="image/jpeg" />
    <link rel="stylesheet" href="/static/login.css" />
    <title>Create Group - Student Study Group Finder</title>
  </head>
  <body>
    <div class="container">
      <h1>Create a Study Group</h1>

      {% if error %}
      <p style="color: red; margin-bottom: 10px;">{{ error }}</p>
      {% endif %}

      <form method="post" action="/creategroup" onsubmit="return validateForm()">
        <label for="title">Group Title:</label><br />
        <input type="text" id="title" name="title" required /><br /><br />

        <label for="description">Description:</label><br />
        <input type="text" id="description" name="description" /><br /><br />

        <label for="privacy">Privacy:</label><br />
        <select id="privacy" name="privacy">
          <option value="Public">Public</option>
          <option value="Private">Private</option>
        </select><br /><br />

        <label for="skill_level">Skill Level:</label><br />
        <select id="skill_level" name="skill_level">
          <option value="Beginner">Beginner</option>
          <option value="Intermediate">Intermediate</option>
          <option value="Advanced">Advanced</option>
        </select><br /><br />

        <input type="submit" value="Create Group" />
      </form>

      <p style="margin-top: 15px;"><a href="/dashboard">Back to Dashboard</a></p>
    </div>

    <script>
      function validateForm() {
        const title = document.getElementById("title").value.trim();
        if (!title) {
          alert("Group title is required.");
          return false;
        }
        return true;
      }
    </script>
  </body>
</html>
