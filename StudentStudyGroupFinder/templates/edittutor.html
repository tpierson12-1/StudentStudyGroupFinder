<!DOCTYPE html>
<html>
<head>
    <title>Edit Tutor Profile</title>
</head>
<body>
    <h1>Edit Tutor Profile</h1>

    {% if error %}
        <p style="color:red;">{{ error }}</p>
    {% endif %}

    <form method="post" action="/edittutor">
        <label>Expertise:</label>
        <input type="text" name="expertise" value="{{ tutor.Tutor_Expertise }}">

        <label>Availability:</label>
        <input type="text" name="availability" value="{{ tutor.Tutor_Availability }}">

        <button type="submit">Save Tutor Profile</button>
    </form>

    <a href="/dashboard">Back to Dashboard</a>
</body>
</html>
