<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="/static/favicon/groupstudy.jpg" type="image/jpeg" />
    <link rel="stylesheet" href="/static/login.css" />
    <title>Login - Student Study Group Finder</title>
  </head>
  <body>
    <div class="container">
      <h1>Login</h1>

      {% if error %}
      <p style="color: red; margin-bottom: 10px;">{{ error }}</p>
      {% endif %}

      <form method="post" action="/login" onsubmit="return validateLogin()">
        <label for="email">Email:</label><br />
        <input type="email" id="email" name="email" required /><br /><br />

        <label for="password">Password:</label><br />
        <input type="password" id="password" name="password" required /><br /><br />

        <input type="submit" value="Login" />
      </form>

      <p style="margin-top: 15px;">
        Don't have an account? <a href="/register">Create one here</a>
      </p>
    </div>

    <script>
      function validateLogin() {
        const email = document.getElementById("email").value.trim();
        const password = document.getElementById("password").value;
        if (!email || !password) {
          alert("Please fill in all fields.");
          return false;
        }
        return true;
      }
    </script>
  </body>
</html>
