<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="/static/favicon/groupstudy.jpg" type="image/jpeg" />
    <link rel="stylesheet" href="/static/login.css" />
    <title>Create Account - Student Study Group Finder</title>
  </head>
  <body>
    <div class="container">
      <h1>Create Account</h1>

      {% if error %}
      <p style="color: red; margin-bottom: 10px;">{{ error }}</p>
      {% endif %}

      <form method="post" action="/register" onsubmit="return validateRegister()">
        <label for="fname">First Name:</label><br />
        <input type="text" id="fname" name="fname" required /><br /><br />

        <label for="lname">Last Name:</label><br />
        <input type="text" id="lname" name="lname" required /><br /><br />

        <label for="email">Email:</label><br />
        <input type="email" id="email" name="email" required /><br /><br />

        <label for="password">Password:</label><br />
        <input type="password" id="password" name="password" required minlength="8" /><br /><br />

        <label for="confirm_pwd">Confirm Password:</label><br />
        <input type="password" id="confirm_pwd" name="confirm_pwd" required /><br /><br />

        <label>
          <input type="checkbox" id="is_tutor" name="is_tutor" value="yes" onclick="toggleTutor()" style="width:auto; margin-right:8px;" />
          I am a tutor
        </label><br /><br />

        <div id="tutor_fields" style="display:none;">
          <label for="expertise">Expertise:</label><br />
          <input type="text" id="expertise" name="expertise" placeholder="e.g. Calculus, Python, SQL" /><br /><br />

          <label for="availability">Availability:</label><br />
          <input type="text" id="availability" name="availability" placeholder="e.g. Mon/Wed 5PM-8PM" /><br /><br />
        </div>

        <input type="submit" value="Create Account" />
      </form>

      <p style="margin-top: 15px;">
        Already have an account? <a href="/login">Login here</a>
      </p>
    </div>

    <script>
      function toggleTutor() {
        const checked = document.getElementById("is_tutor").checked;
        document.getElementById("tutor_fields").style.display = checked ? "block" : "none";
      }

      function validateRegister() {
        const fname = document.getElementById("fname").value.trim();
        const lname = document.getElementById("lname").value.trim();
        const email = document.getElementById("email").value.trim();
        const password = document.getElementById("password").value;
        const confirm = document.getElementById("confirm_pwd").value;

        if (!fname || !lname || !email || !password || !confirm) {
          alert("All fields are required.");
          return false;
        }
        if (password.length < 8) {
          alert("Password must be at least 8 characters.");
          return false;
        }
        if (password !== confirm) {
          alert("Passwords do not match.");
          return false;
        }
        if (document.getElementById("is_tutor").checked) {
          if (!document.getElementById("expertise").value.trim()) {
            alert("Please enter your expertise.");
            return false;
          }
          if (!document.getElementById("availability").value.trim()) {
            alert("Please enter your availability.");
            return false;
          }
        }
        return true;
      }
    </script>
  </body>
</html>
